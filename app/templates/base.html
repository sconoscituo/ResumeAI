<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ResumeAI{% endblock %} - AI 이력서/자소서 빌더</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#4F46E5', hover: '#4338CA' },
            accent:  { DEFAULT: '#06B6D4', hover: '#0891B2' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- 네비게이션 -->
  <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-2 font-bold text-xl text-indigo-600">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          ResumeAI
        </a>
        <div class="flex items-center gap-1">
          <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">대시보드</a>
          <a href="/profiles/new" class="nav-link {% if '/profiles' in request.url.path %}active{% endif %}">프로필</a>
          <a href="/resumes/new" class="nav-link {% if '/resumes' in request.url.path %}active{% endif %}">이력서</a>
          <a href="/cover-letters/new" class="nav-link {% if '/cover-letters' in request.url.path %}active{% endif %}">자소서</a>
          <a href="/analysis" class="nav-link {% if '/analysis' in request.url.path %}active{% endif %}">ATS 분석</a>
          <a href="/interviews" class="nav-link {% if '/interviews' in request.url.path %}active{% endif %}">면접 준비</a>
          <a href="/jobs" class="nav-link {% if '/jobs' in request.url.path %}active{% endif %}">채용공고</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- 플래시 메시지 영역 -->
  <div id="toast-container" class="fixed top-20 right-4 z-50 flex flex-col gap-2"></div>

  <!-- 메인 콘텐츠 -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- 푸터 -->
  <footer class="bg-white border-t border-gray-100 mt-auto py-4 text-center text-sm text-gray-400">
    ResumeAI &copy; 2026 — Powered by Google Gemini
  </footer>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
