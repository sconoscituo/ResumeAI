{% extends "base.html" %}
{% block title %}면접 준비{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">

  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">면접 예상 질문 생성</h1>
    <a href="/" class="text-sm text-gray-500 hover:text-gray-700">← 대시보드</a>
  </div>

  <!-- 생성 폼 -->
  <div class="card">
    <h2 class="section-title">면접 질문 설정</h2>
    <div class="space-y-4">
      <div>
        <label class="form-label">프로필 선택 <span class="text-red-500">*</span></label>
        <select id="iv-profile" class="form-input">
          <option value="">프로필을 선택하세요</option>
          {% for p in profiles %}
          <option value="{{ p.id }}">{{ p.name }} ({{ p.email }})</option>
          {% endfor %}
        </select>
        {% if not profiles %}
        <p class="text-sm text-amber-600 mt-1">프로필이 없습니다. <a href="/profiles/new" class="underline">프로필 먼저 만들기</a></p>
        {% endif %}
      </div>
      <div>
        <label class="form-label">자기소개서 선택 <span class="text-gray-400 font-normal">(선택 — 있으면 더 정확한 질문 생성)</span></label>
        <select id="iv-cl" class="form-input">
          <option value="">자기소개서 없이 생성</option>
          {% for cl in cover_letters %}
          <option value="{{ cl.id }}">{{ cl.title }}{% if cl.company_name %} — {{ cl.company_name }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div class="flex justify-end">
        <button onclick="generateInterview()" id="gen-btn" class="btn-primary flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          AI 면접 질문 생성
        </button>
      </div>
    </div>
  </div>

  <!-- 로딩 -->
  <div id="loading-card" class="card text-center py-12 hidden">
    <div class="inline-block animate-spin w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
    <p class="text-gray-600 font-medium">AI가 면접 질문을 생성하고 있습니다...</p>
    <p class="text-gray-400 text-sm mt-1">이력서와 자소서를 분석해 맞춤형 질문을 준비하는 중입니다.</p>
  </div>

  <!-- 카테고리 필터 탭 -->
  <div id="filter-tabs" class="hidden flex gap-2 flex-wrap">
    <button onclick="filterCategory('all')" id="tab-all"
      class="tab-btn px-4 py-2 rounded-full text-sm font-medium bg-indigo-600 text-white">
      전체
    </button>
    <button onclick="filterCategory('technical')" id="tab-technical"
      class="tab-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">
      기술 면접
    </button>
    <button onclick="filterCategory('personality')" id="tab-personality"
      class="tab-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">
      인성 면접
    </button>
    <button onclick="filterCategory('experience')" id="tab-experience"
      class="tab-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">
      경험 기반 면접
    </button>
  </div>

  <!-- 질문 카드 목록 -->
  <div id="questions-container" class="space-y-4 hidden"></div>

</div>
{% endblock %}

{% block scripts %}
<script>
const CATEGORY_COLORS = {
  technical:   { bg: 'bg-blue-50',   text: 'text-blue-700',   border: 'border-blue-200',  badge: 'bg-blue-100 text-blue-700' },
  personality: { bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-200', badge: 'bg-purple-100 text-purple-700' },
  experience:  { bg: 'bg-green-50',  text: 'text-green-700',  border: 'border-green-200',  badge: 'bg-green-100 text-green-700' },
};

let allQuestions = [];
let currentFilter = 'all';

async function generateInterview() {
  const profileId = document.getElementById('iv-profile').value;
  const clId = document.getElementById('iv-cl').value;

  if (!profileId) { showToast('프로필을 선택하세요.', 'error'); return; }

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading-card').classList.remove('hidden');
  document.getElementById('questions-container').classList.add('hidden');
  document.getElementById('filter-tabs').classList.add('hidden');

  try {
    const body = { profile_id: parseInt(profileId) };
    if (clId) body.cover_letter_id = parseInt(clId);

    const res = await fetch('/api/interviews/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '생성 실패');
    }

    const data = await res.json();
    allQuestions = data.questions || [];

    renderQuestions(allQuestions);
    document.getElementById('filter-tabs').classList.remove('hidden');
    showToast(`면접 질문 ${allQuestions.length}개가 생성되었습니다!`, 'success');
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  }

  document.getElementById('gen-btn').disabled = false;
  document.getElementById('loading-card').classList.add('hidden');
}

function renderQuestions(questions) {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  if (questions.length === 0) {
    container.innerHTML = '<div class="card text-center py-8 text-gray-400">질문이 없습니다.</div>';
    container.classList.remove('hidden');
    return;
  }

  questions.forEach((q, idx) => {
    const colors = CATEGORY_COLORS[q.category] || CATEGORY_COLORS.personality;
    const card = document.createElement('div');
    card.className = `card border-l-4 ${colors.border} question-card`;
    card.dataset.category = q.category;

    card.innerHTML = `
      <div class="flex items-start justify-between gap-4">
        <div class="flex items-start gap-3 flex-1">
          <span class="text-2xl font-bold text-gray-200 leading-none mt-0.5">${String(idx + 1).padStart(2, '0')}</span>
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-2">
              <span class="px-2 py-0.5 rounded-full text-xs font-medium ${colors.badge}">${q.category_label || '면접'}</span>
            </div>
            <p class="font-semibold text-gray-900 leading-relaxed">${escHtml(q.question)}</p>
          </div>
        </div>
        <button onclick="toggleAnswer(${idx})" id="toggle-btn-${idx}"
          class="flex-shrink-0 flex items-center gap-1 text-sm text-indigo-600 hover:text-indigo-800 font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
          답변 보기
        </button>
      </div>
      <div id="answer-${idx}" class="hidden mt-4 space-y-3">
        <div class="${colors.bg} rounded-lg p-4">
          <p class="text-xs font-semibold ${colors.text} mb-2">모범 답변</p>
          <p class="text-sm text-gray-700 leading-relaxed">${escHtml(q.model_answer || '')}</p>
        </div>
        ${q.tips ? `
        <div class="bg-amber-50 rounded-lg p-3">
          <p class="text-xs font-semibold text-amber-700 mb-1">면접 팁</p>
          <p class="text-sm text-amber-800">${escHtml(q.tips)}</p>
        </div>` : ''}
      </div>
    `;
    container.appendChild(card);
  });

  container.classList.remove('hidden');
}

function toggleAnswer(idx) {
  const answerDiv = document.getElementById(`answer-${idx}`);
  const btn = document.getElementById(`toggle-btn-${idx}`);
  const isHidden = answerDiv.classList.contains('hidden');

  answerDiv.classList.toggle('hidden', !isHidden);
  btn.innerHTML = isHidden
    ? `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg> 답변 닫기`
    : `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg> 답변 보기`;
}

function filterCategory(category) {
  currentFilter = category;

  // 탭 스타일 업데이트
  ['all', 'technical', 'personality', 'experience'].forEach(c => {
    const btn = document.getElementById(`tab-${c}`);
    if (c === category) {
      btn.className = 'tab-btn px-4 py-2 rounded-full text-sm font-medium bg-indigo-600 text-white';
    } else {
      btn.className = 'tab-btn px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200';
    }
  });

  // 카드 필터링
  document.querySelectorAll('.question-card').forEach(card => {
    if (category === 'all' || card.dataset.category === category) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
{% endblock %}
