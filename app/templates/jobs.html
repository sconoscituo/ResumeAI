{% extends "base.html" %}
{% block title %}채용공고{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">

  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">채용공고 검색</h1>
    <a href="/" class="text-sm text-gray-500 hover:text-gray-700">← 대시보드</a>
  </div>

  <!-- 검색 폼 -->
  <div class="card">
    <h2 class="section-title">키워드 검색 + 프로필 매칭</h2>
    <div class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="form-label">검색 키워드 <span class="text-red-500">*</span></label>
          <input id="job-keyword" class="form-input" placeholder="예: 백엔드 개발자, Python, 데이터분석"
            onkeydown="if(event.key==='Enter') searchJobs()" />
        </div>
        <div>
          <label class="form-label">프로필 매칭 <span class="text-gray-400 font-normal">(선택)</span></label>
          <select id="job-profile" class="form-input">
            <option value="">매칭 점수 없이 검색</option>
            {% for p in profiles %}
            <option value="{{ p.id }}">{{ p.name }} ({{ p.email }})</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <p class="text-sm text-gray-400">사람인 RSS 기반으로 실시간 채용공고를 수집합니다.</p>
        <button onclick="searchJobs()" id="search-btn" class="btn-primary flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          채용공고 검색
        </button>
      </div>
    </div>
  </div>

  <!-- 로딩 -->
  <div id="loading-card" class="card text-center py-12 hidden">
    <div class="inline-block animate-spin w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
    <p class="text-gray-600 font-medium">채용공고를 수집하고 있습니다...</p>
    <p class="text-gray-400 text-sm mt-1">프로필 매칭 점수를 계산하는 중입니다. 잠시만 기다려 주세요.</p>
  </div>

  <!-- 검색 결과 헤더 -->
  <div id="results-header" class="hidden flex items-center justify-between">
    <p id="results-count" class="text-sm text-gray-500"></p>
    <select id="sort-select" onchange="sortJobs(this.value)" class="form-input w-auto text-sm">
      <option value="match">매칭 점수 순</option>
      <option value="latest">최신 순</option>
    </select>
  </div>

  <!-- 채용공고 목록 -->
  <div id="jobs-container" class="space-y-4 hidden"></div>

</div>
{% endblock %}

{% block scripts %}
<script>
let allJobs = [];

async function searchJobs() {
  const keyword = document.getElementById('job-keyword').value.trim();
  const profileId = document.getElementById('job-profile').value;

  if (!keyword) { showToast('검색 키워드를 입력하세요.', 'error'); return; }

  document.getElementById('search-btn').disabled = true;
  document.getElementById('loading-card').classList.remove('hidden');
  document.getElementById('jobs-container').classList.add('hidden');
  document.getElementById('results-header').classList.add('hidden');

  try {
    let url = `/api/jobs/search?keyword=${encodeURIComponent(keyword)}`;
    if (profileId) url += `&profile_id=${profileId}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error('검색 실패');
    const data = await res.json();

    allJobs = data.jobs || [];
    renderJobs(allJobs);

    document.getElementById('results-header').classList.remove('hidden');
    document.getElementById('results-count').textContent =
      `"${keyword}" 검색 결과 ${allJobs.length}개`;
    showToast(`채용공고 ${allJobs.length}개를 불러왔습니다.`, 'success');
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  }

  document.getElementById('search-btn').disabled = false;
  document.getElementById('loading-card').classList.add('hidden');
}

function renderJobs(jobs) {
  const container = document.getElementById('jobs-container');
  container.innerHTML = '';

  if (jobs.length === 0) {
    container.innerHTML = '<div class="card text-center py-10 text-gray-400">검색 결과가 없습니다. 다른 키워드로 검색해 보세요.</div>';
    container.classList.remove('hidden');
    return;
  }

  jobs.forEach(job => {
    const score = job.matched_score || 0;
    const scoreColor = score >= 70 ? 'text-green-600 bg-green-50' :
                       score >= 40 ? 'text-yellow-600 bg-yellow-50' :
                                     'text-gray-500 bg-gray-50';
    const barColor = score >= 70 ? 'bg-green-500' :
                     score >= 40 ? 'bg-yellow-400' : 'bg-gray-300';

    const card = document.createElement('div');
    card.className = 'card hover:shadow-md transition-shadow';
    card.innerHTML = `
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 font-medium">${escHtml(job.source || '사람인')}</span>
            ${job.deadline ? `<span class="text-xs text-gray-400">마감: ${escHtml(job.deadline)}</span>` : ''}
          </div>
          <h3 class="font-bold text-gray-900 text-base leading-snug">
            ${job.url
              ? `<a href="${escHtml(job.url)}" target="_blank" rel="noopener" class="hover:text-indigo-600 hover:underline">${escHtml(job.title)}</a>`
              : escHtml(job.title)
            }
          </h3>
          ${job.company ? `<p class="text-sm text-gray-500 mt-0.5">${escHtml(job.company)}</p>` : ''}
          ${job.description ? `<p class="text-sm text-gray-600 mt-2 line-clamp-2 leading-relaxed">${escHtml(job.description.slice(0, 200))}${job.description.length > 200 ? '...' : ''}</p>` : ''}
        </div>
        ${score > 0 ? `
        <div class="flex-shrink-0 text-center w-20">
          <div class="text-2xl font-bold ${scoreColor} rounded-xl px-2 py-1">${score}</div>
          <div class="text-xs text-gray-400 mt-1">매칭률</div>
          <div class="w-full bg-gray-200 rounded-full h-1.5 mt-1">
            <div class="h-1.5 rounded-full ${barColor}" style="width: ${score}%"></div>
          </div>
        </div>` : ''}
      </div>
      ${job.url ? `
      <div class="mt-3 pt-3 border-t border-gray-100 flex justify-end">
        <a href="${escHtml(job.url)}" target="_blank" rel="noopener"
          class="text-sm text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1">
          공고 보러 가기
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
        </a>
      </div>` : ''}
    `;
    container.appendChild(card);
  });

  container.classList.remove('hidden');
}

function sortJobs(by) {
  let sorted = [...allJobs];
  if (by === 'match') {
    sorted.sort((a, b) => (b.matched_score || 0) - (a.matched_score || 0));
  }
  // 'latest'는 원래 순서 유지
  renderJobs(sorted);
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
{% endblock %}
